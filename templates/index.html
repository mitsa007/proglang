
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitTrack Pro</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="card-header">
                <img src="https://storage.googleapis.com/aai-web-template-images/fit-track-pro-logo.png" alt="FitTrack Pro" class="logo">
                <h1>FitTrack Pro</h1>
                <p>Your AI-Powered Fitness Journey</p>
            </div>
            <div class="card-body">
                <form action="{{ url_for('create_profile') }}" method="post">
                    <div class="form-group">
                        <label for="name">Your Name</label>
                        <input type="text" id="name" name="name" placeholder="Enter your name" required>
                    </div>
                    <div class="form-group">
                        <label for="age">Age</label>
                        <input type="number" id="age" name="age" placeholder="25" required>
                    </div>
                    <div class="form-group">
                        <label for="weight">Weight (kg)</label>
                        <input type="number" id="weight" name="weight" placeholder="70" required>
                    </div>
                    <div class="form-group">
                        <label for="height">Height (cm)</label>
                        <input type="number" id="height" name="height" placeholder="175" required>
                    </div>
                    <div class="form-group">
                        <label>Your Goal</label>
                        <div class="goal-options">
                            <button type="button" class="goal-option" data-goal="lose">Lose</button>
                            <button type="button" class="goal-option" data-goal="maintain">Maintain</button>
                            <button type="button" class="goal-option" data-goal="gain">Gain</button>
                        </div>
                        <input type="hidden" id="goal" name="goal" required>
                    </div>
                    <button type="submit" class="btn">Start Your Journey 🚀</button>
                </form>
            </div>
        </div>
    </div>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
