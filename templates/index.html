<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="VitCheck — Start your AI-powered fitness journey today.">
  <title>VitCheck — Get Started</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-body">
  <div class="auth-card fade-in">
    <div class="auth-card-header">
      <img src="{{ url_for('static', filename='images/vitcheck_logo.png') }}" alt="VitCheck logo" class="logo">
      <h1>VitCheck</h1>
      <p>Your AI-Powered Fitness Journey</p>
    </div>
    <div class="auth-card-body">
      <form action="{{ url_for('create_profile') }}" method="post">
        <div class="form-group">
          <label for="name">Your Name</label>
          <input type="text" id="name" name="name" placeholder="e.g. Alex Johnson" required>
        </div>
        <div class="form-group">
          <label for="age">Age</label>
          <input type="number" id="age" name="age" placeholder="25" min="10" max="120" required>
        </div>
        <div class="form-group">
          <label for="weight">Weight (kg)</label>
          <input type="number" id="weight" name="weight" placeholder="70" min="20" max="300" required>
        </div>
        <div class="form-group">
          <label for="height">Height (cm)</label>
          <input type="number" id="height" name="height" placeholder="175" min="50" max="280" required>
        </div>
        <div class="form-group">
          <label>Your Goal</label>
          <div class="goal-options">
            <button type="button" class="goal-option" data-goal="lose" id="goal-lose">
              <svg viewBox="0 0 24 24"><polyline points="23 18 13.5 8.5 8.5 13.5 1 6"/><polyline points="17 18 23 18 23 12"/></svg>
              Lose
            </button>
            <button type="button" class="goal-option" data-goal="maintain" id="goal-maintain">
              <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/></svg>
              Maintain
            </button>
            <button type="button" class="goal-option" data-goal="gain" id="goal-gain">
              <svg viewBox="0 0 24 24"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
              Gain
            </button>
          </div>
          <input type="hidden" id="goal" name="goal" required>
        </div>
        <button type="submit" class="btn">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 8 16 12 12 16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
          Start Your Journey
        </button>
      </form>
      <div class="auth-footer-link">
        Already have an account? <a href="{{ url_for('login') }}">Sign in</a>
      </div>
    </div>
  </div>
  <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
