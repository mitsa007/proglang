
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitTrack Pro - Profile</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <div class="logo-container">
                <img src="https://storage.googleapis.com/aai-web-template-images/fit-track-pro-logo.png" alt="FitTrack Pro" class="logo">
                <h1>FitTrack Pro</h1>
            </div>
            <nav>
                <ul>
                    <li><a href="{{ url_for('overview') }}">Overview</a></li>
                    <li><a href="{{ url_for('workout') }}">Workout</a></li>
                    <li><a href="{{ url_for('meals') }}">Meals</a></li>
                    <li><a href="{{ url_for('progress') }}">Progress</a></li>
                    <li class="active"><a href="{{ url_for('profile') }}">Profile</a></li>
                </ul>
            </nav>
        </div>
        <div class="main-content">
            <header>
                <h2>Your Profile 👤</h2>
            </header>
            <div class="card">
                <div class="card-body">
                    <form action="{{ url_for('update_profile') }}" method="post">
                        <div class="form-group">
                            <label for="name">Name</label>
                            <input type="text" id="name" name="name" value="{{ user.name }}">
                        </div>
                        <div class="form-group">
                            <label for="age">Age</label>
                            <input type="number" id="age" name="age" value="{{ user.age }}">
                        </div>
                        <div class="form-group">
                            <label for="weight">Weight (kg)</label>
                            <input type="number" id="weight" name="weight" value="{{ user.weight }}">
                        </div>
                        <div class="form-group">
                            <label for="height">Height (cm)</label>
                            <input type="number" id="height" name="height" value="{{ user.height }}">
                        </div>
                        <div class="form-group">
                            <label for="goal">Goal</label>
                            <select id="goal" name="goal">
                                <option value="lose" {% if user.goal == 'lose' %}selected{% endif %}>Lose Weight</option>
                                <option value="maintain" {% if user.goal == 'maintain' %}selected{% endif %}>Maintain Weight</option>
                                <option value="gain" {% if user.goal == 'gain' %}selected{% endif %}>Gain Weight</option>
                            </select>
                        </div>
                        <button type="submit" class="btn">Update Profile</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
