
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitTrack Pro - Meal Tracker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <div class="logo-container">
                <img src="https://storage.googleapis.com/aai-web-template-images/fit-track-pro-logo.png" alt="FitTrack Pro" class="logo">
                <h1>FitTrack Pro</h1>
            </div>
            <nav>
                <ul>
                    <li><a href="{{ url_for('overview') }}">Overview</a></li>
                    <li><a href="{{ url_for('workout') }}">Workout</a></li>
                    <li class="active"><a href="{{ url_for('meals') }}">Meals</a></li>
                    <li><a href="{{ url_for('progress') }}">Progress</a></li>
                    <li><a href="{{ url_for('profile') }}">Profile</a></li>
                </ul>
            </nav>
        </div>
        <div class="main-content">
            <header>
                <h2>Meal Tracker 🍽️</h2>
            </header>
            <div class="card">
                <div class="card-body">
                    <h3>Log Your Meal</h3>
                    <form action="{{ url_for('add_meal') }}" method="post">
                        <div class="form-group">
                            <label for="meal-type">Meal Type</label>
                            <select id="meal-type" name="meal-type">
                                <option value="breakfast">Breakfast</option>
                                <option value="lunch">Lunch</option>
                                <option value="dinner">Dinner</option>
                                <option value="snack">Snack</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="description">Description</label>
                            <input type="text" id="description" name="description" placeholder="e.g., Grilled chicken salad">
                        </div>
                        <div class="form-group">
                            <label for="calories">Calories</label>
                            <input type="number" id="calories" name="calories" placeholder="350">
                        </div>
                        <button type="submit" class="btn">Add Meal</button>
                    </form>
                </div>
            </div>
            <div class="card">
                <div class="card-body">
                    <h3>Today's Meals</h3>
                    <ul class="meal-list">
                        {% for meal in meals %}
                        <li>{{ meal.meal_type }}: {{ meal.description }} ({{ meal.calories }} kcal)</li>
                        {% endfor %}
                    </ul>
                </div>
            </div>
        </div>
    </div>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
