<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sign in to your VitCheck account.">
  <title>VitCheck — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <!-- Dark mode is disabled on auth pages -->
  <script>
    localStorage.removeItem('darkMode');
    document.documentElement.classList.remove('dark');
  </script>
</head>
<body class="auth-body">
  <div class="auth-card fade-in">
    <div class="auth-card-header">
      <img src="{{ url_for('static', filename='images/vitcheck_logo.png') }}" alt="VitCheck logo" class="logo">
      <h1>Welcome Back</h1>
      <p>Sign in to continue your journey</p>
    </div>
    <div class="auth-card-body">
      {% with messages = get_flashed_messages() %}
        {% if messages %}
          {% for msg in messages %}
            <div class="flash-msg">
              <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
              </svg>
              {{ msg }}
            </div>
          {% endfor %}
        {% endif %}
      {% endwith %}
      <form action="{{ url_for('login') }}" method="post">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="e.g. alex_johnson" autocomplete="username" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn" id="login-btn">
          <svg viewBox="0 0 24 24"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
          Sign In
        </button>
      </form>
      <div class="auth-footer-link">
        Don't have an account? <a href="{{ url_for('register') }}">Create one</a>
      </div>
    </div>
  </div>
</body>
</html>
