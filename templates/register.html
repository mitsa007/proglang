<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Create your VitCheck account and start tracking your fitness.">
  <title>VitCheck — Register</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <!-- Dark mode is disabled on auth pages -->
  <script>
    localStorage.removeItem('darkMode');
    document.documentElement.classList.remove('dark');
  </script>
  <style>
    .pw-rules {
      margin-top: 8px;
      padding: 10px 14px;
      border-radius: 8px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      list-style: none;
      font-size: 0.8rem;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .pw-rules li {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #a0a0b0;
      transition: color 0.25s;
    }
    .pw-rules li.ok {
      color: #4ade80;
    }
    .pw-rules li::before {
      content: '✗';
      font-weight: 700;
      color: #f87171;
      transition: color 0.25s;
    }
    .pw-rules li.ok::before {
      content: '✓';
      color: #4ade80;
    }
    .flash-messages {
      margin-bottom: 12px;
    }
    .flash-msg {
      background: rgba(248, 113, 113, 0.15);
      border: 1px solid rgba(248, 113, 113, 0.4);
      color: #fca5a5;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.85rem;
      margin-bottom: 8px;
    }
  </style>
</head>
<body class="auth-body">
  <div class="auth-card fade-in">
    <div class="auth-card-header">
      <img src="{{ url_for('static', filename='images/vitcheck_logo.png') }}" alt="VitCheck logo" class="logo">
      <h1>Create Account</h1>
      <p>Join VitCheck for free</p>
    </div>
    <div class="auth-card-body">
      {% with messages = get_flashed_messages() %}
        {% if messages %}
          <div class="flash-messages">
            {% for msg in messages %}
              <div class="flash-msg">{{ msg }}</div>
            {% endfor %}
          </div>
        {% endif %}
      {% endwith %}
      <form action="{{ url_for('register') }}" method="post" id="register-form">
        <div class="form-group">
          <label for="name">Display Name</label>
          <input type="text" id="name" name="name" placeholder="e.g. Alex Johnson" autocomplete="name" required>
        </div>
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="e.g. alex_johnson" autocomplete="username" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Create a strong password" autocomplete="new-password" required>
          <ul class="pw-rules" id="pw-rules" aria-label="Password requirements">
            <li id="rule-length">At least 8 characters</li>
            <li id="rule-upper">At least 1 uppercase letter</li>
            <li id="rule-number">At least 1 number</li>
          </ul>
        </div>
        <button type="submit" class="btn" id="register-btn">
          <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="8.5" cy="7" r="4"/>
            <line x1="20" y1="8" x2="20" y2="14"/>
            <line x1="23" y1="11" x2="17" y2="11"/>
          </svg>
          Create Account
        </button>
      </form>
      <div class="auth-footer-link">
        Already have an account? <a href="{{ url_for('login') }}">Sign in</a>
      </div>
    </div>
  </div>

  <script>
    const pwInput   = document.getElementById('password');
    const ruleLen   = document.getElementById('rule-length');
    const ruleUpper = document.getElementById('rule-upper');
    const ruleNum   = document.getElementById('rule-number');
    const form      = document.getElementById('register-form');

    function checkRules(value) {
      ruleLen.classList.toggle('ok',   value.length >= 8);
      ruleUpper.classList.toggle('ok', /[A-Z]/.test(value));
      ruleNum.classList.toggle('ok',   /[0-9]/.test(value));
    }

    pwInput.addEventListener('input', () => checkRules(pwInput.value));

    form.addEventListener('submit', (e) => {
      const v = pwInput.value;
      if (v.length < 8 || !/[A-Z]/.test(v) || !/[0-9]/.test(v)) {
        e.preventDefault();
        checkRules(v);
        pwInput.focus();
      }
    });
  </script>
</body>
</html>
