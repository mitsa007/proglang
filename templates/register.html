<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Create your VitCheck account and start tracking your fitness.">
  <title>VitCheck — Register</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-body">
  <div class="auth-card fade-in">
    <div class="auth-card-header">
      <img src="{{ url_for('static', filename='images/vitcheck_logo.png') }}" alt="VitCheck logo" class="logo">
      <h1>Create Account</h1>
      <p>Join VitCheck for free</p>
    </div>
    <div class="auth-card-body">
      <form action="{{ url_for('register') }}" method="post">
        <div class="form-group">
          <label for="name">Display Name</label>
          <input type="text" id="name" name="name" placeholder="e.g. Alex Johnson" autocomplete="name" required>
        </div>
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="e.g. alex_johnson" autocomplete="username" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Create a strong password" autocomplete="new-password" required>
        </div>
        <button type="submit" class="btn" id="register-btn">
          <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="8.5" cy="7" r="4"/>
            <line x1="20" y1="8" x2="20" y2="14"/>
            <line x1="23" y1="11" x2="17" y2="11"/>
          </svg>
          Create Account
        </button>
      </form>
      <div class="auth-footer-link">
        Already have an account? <a href="{{ url_for('login') }}">Sign in</a>
      </div>
    </div>
  </div>
</body>
</html>
