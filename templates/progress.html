
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitTrack Pro - Progress</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <div class="logo-container">
                <img src="https://storage.googleapis.com/aai-web-template-images/fit-track-pro-logo.png" alt="FitTrack Pro" class="logo">
                <h1>FitTrack Pro</h1>
            </div>
            <nav>
                <ul>
                    <li><a href="{{ url_for('overview') }}">Overview</a></li>
                    <li><a href="{{ url_for('workout') }}">Workout</a></li>
                    <li><a href="{{ url_for('meals') }}">Meals</a></li>
                    <li class="active"><a href="{{ url_for('progress') }}">Progress</a></li>
                    <li><a href="{{ url_for('profile') }}">Profile</a></li>
                </ul>
            </nav>
        </div>
        <div class="main-content">
            <header>
                <h2>Your Progress 📊</h2>
            </header>
            <div class="card">
                <div class="card-body">
                    <h3>Weight Journey</h3>
                    <canvas id="weightChart"></canvas>
                </div>
            </div>
            <div class="card">
                <div class="card-body">
                    <h3>Workout Duration</h3>
                    <canvas id="workoutDurationChart"></canvas>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
