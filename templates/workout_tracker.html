
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitTrack Pro - Workout Tracker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <div class="logo-container">
                <img src="https://storage.googleapis.com/aai-web-template-images/fit-track-pro-logo.png" alt="FitTrack Pro" class="logo">
                <h1>FitTrack Pro</h1>
            </div>
            <nav>
                <ul>
                    <li><a href="{{ url_for('overview') }}">Overview</a></li>
                    <li class="active"><a href="{{ url_for('workout') }}">Workout</a></li>
                    <li><a href="{{ url_for('meals') }}">Meals</a></li>
                    <li><a href="{{ url_for('progress') }}">Progress</a></li>
                    <li><a href="{{ url_for('profile') }}">Profile</a></li>
                </ul>
            </nav>
        </div>
        <div class="main-content">
            <header>
                <h2>Workout Tracker 🏋️</h2>
            </header>
            <div class="card">
                <div class="card-body">
                    <h3>Log Your Workout</h3>
                    <form action="{{ url_for('add_workout') }}" method="post">
                        <div class="form-group">
                            <label for="workout-type">Workout Type</label>
                            <select id="workout-type" name="workout-type">
                                <option value="running">Running</option>
                                <option value="cycling">Cycling</option>
                                <option value="weightlifting">Weightlifting</option>
                                <option value="yoga">Yoga</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="duration">Duration (minutes)</label>
                            <input type="number" id="duration" name="duration" placeholder="30">
                        </div>
                        <div class="form-group">
                            <label for="intensity">Intensity</label>
                            <select id="intensity" name="intensity">
                                <option value="low">Low</option>
                                <option value="medium">Medium</option>
                                <option value="high">High</option>
                            </select>
                        </div>
                        <button type="submit" class="btn">Add Workout</button>
                    </form>
                </div>
            </div>
            <div class="card">
                <div class="card-body">
                    <h3>Today's Workouts</h3>
                    <ul class="workout-list">
                        {% for workout in workouts %}
                        <li>{{ workout.workout_type }} for {{ workout.duration }} mins ({{ workout.intensity }} intensity)</li>
                        {% endfor %}
                    </ul>
                </div>
            </div>
        </div>
    </div>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
